  <title>Download Price Match Paradise</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f4f7fb;
      color: #172033;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border: 1px solid #e3e8f2;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(23, 32, 51, 0.12);
      padding: 36px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #e3e8f2;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .brand img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 560px;
      margin: 14px auto 30px;
      color: #5f6f89;
      font-size: 17px;
      line-height: 1.55;
    }

    .store-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .store-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 86px;
      padding: 18px;
      border-radius: 14px;
      text-decoration: none;
      color: #ffffff;
      font-weight: 700;
      font-size: 18px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .store-link:hover,
    .store-link:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(23, 32, 51, 0.18);
      outline: none;
    }

    .ios {
      background: #111827;
    }

    .android {
      background: #188038;
    }

    .store-icon {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      fill: currentColor;
    }

    .small {
      display: block;
      font-size: 13px;
      font-weight: 500;
      opacity: 0.82;
      margin-bottom: 2px;
    }

    .footer {
      margin-top: 28px;
      color: #6c757d;
      font-size: 13px;
    }

    .footer a {
      color: inherit;
    }

    @media (max-width: 620px) {
      .page {
        padding: 28px 18px;
      }

      .store-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
